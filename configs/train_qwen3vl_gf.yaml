model:
  # Local snapshot path for one-time download + offline reuse.
  name: /home/elicer/gaze_mllm/local_models/Qwen3-VL-8B-Thinking
  dtype: bfloat16
  dino_name: facebook/dinov3-vitb16-pretrain-lvd1689m
  cache_dir: /home/elicer/gaze_mllm/local_cache/hf
  local_files_only: true
  train_dino: false
  gradient_checkpointing: false
  # full | lora | head_only
  train_mode: head_only
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  dino_hidden_size: 768

data:
  qwen_image_size: 256
  image_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_extended
  train_annotation: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow/train_annotations_new.txt
  val_annotation: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow/val_annotations_new.txt
  test_annotation: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_extended/test_annotations_release_2.txt
  label_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow
  label_embed_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow/label-embeds
  vocab2id_path: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow/vocab2id.json

  reason_output_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_reason/output
  reason_mark_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_reason/mark
  reason_prompt_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_reason/prompt
  reason_feature_root: /mnt/elice/datahub/pixel-bucket-jinwoong/data/gazefollow_reason/features
  reason_feature_h5_path: /home/elicer/semgaze/data/gazefollow_reason/features/train.h5

  use_precomputed_dino_features: true
  dino_feature_h5_train: /home/elicer/gaze_mllm/data/dino_features/train.h5
  dino_feature_h5_val: /home/elicer/gaze_mllm/data/dino_features/val.h5
  dino_feature_h5_test: /home/elicer/gaze_mllm/data/dino_features/test.h5

  include_mark_image: true
  include_reason_text: false

prompt:
  base: |
    You are a gaze estimation model.
    Given scene image, head crop, and visual-prompt image, predict where the person is looking.
    Return internal representation that helps coordinate regression.

loss:
  w_heatmap: 100.0
  w_coord: 1.0
  w_vec: 0.0
  w_angle: 1.0
  w_inout: 0.5
  w_reason: 1.0
  w_label: 0.3
  heatmap_size: 64
  heatmap_sigma: 3.0
  reason_dim: 1024
  label_dim: 512
  angle_feature_dim: 512
  reason_loss_type: cosine

optim:
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03

train:
  seed: 42
  device: cuda
  precision: bf16
  print_model_summary: true
  sanity_val_steps: 0
  epochs: 1
  batch_size: 64
  grad_accum: 4
  num_workers: 12
  log_every: 10
  progress_bar: true
  num_train_samples: 108955
  output_dir: /home/elicer/gaze_mllm/checkpoints/qwen3vl_gf

eval:
  batch_size: 64
  num_workers: 12

test:
  run_after_train: true
  batch_size: 1
  num_workers: 12

wandb:
  log: true
  project: gaze_mllm
  entity: semgaze
  name: qwen3vl_gf
  group: null
  watch: none
  watch_freq: 500
